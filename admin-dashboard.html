<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Admin Dashboard | Fun Corner</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body {
            background: #050508;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        :root {
            --theme-color: #ffd700;
            --theme-bg: rgba(255, 215, 0, 0.1);
        }

        /* Header */
        .header {
            background: rgba(10,10,15,0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .admin-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .admin-avatar {
            width: 45px;
            height: 45px;
            background: var(--theme-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: #000;
        }
        .branch-badge {
            background: var(--theme-bg);
            padding: 6px 15px;
            border-radius: 30px;
            color: var(--theme-color);
            font-weight: 600;
        }
        .logout-btn {
            background: rgba(225,48,108,0.1);
            color: #E1306C;
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            border: 1px solid rgba(225,48,108,0.3);
            transition: 0.2s;
        }
        .logout-btn:hover {
            background: #E1306C;
            color: #fff;
        }

        /* Content */
        .dashboard-body {
            padding: 25px;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: rgba(20,20,30,0.6);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: 0.2s;
        }
        .stat-card:hover {
            border-color: var(--theme-color);
            transform: translateY(-3px);
        }
        .stat-icon {
            width: 50px;
            height: 50px;
            background: var(--theme-bg);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: var(--theme-color);
        }
        .stat-info h3 { font-size: 1.6rem; font-weight: 800; }
        .stat-info p { color: #888; font-size: 0.8rem; }

        .table-container {
            background: rgba(20,20,30,0.6);
            border-radius: 20px;
            padding: 20px;
            margin-top: 20px;
            overflow-x: auto;
        }
        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 20px;
        }
        .search-box {
            display: flex;
            gap: 8px;
            align-items: center;
            background: rgba(0,0,0,0.4);
            padding: 5px 12px;
            border-radius: 40px;
        }
        .search-box input {
            background: transparent;
            border: none;
            color: white;
            padding: 8px;
            outline: none;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 600px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .status-badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .status-pending { background: rgba(240,148,51,0.2); color: #f09433; }
        .status-approved { background: rgba(40,167,69,0.2); color: #28a745; }
        .action-btns {
            display: flex;
            gap: 8px;
        }
        .btn-act {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .btn-approve { background: rgba(40,167,69,0.2); color: #28a745; }
        .btn-approve:hover { background: #28a745; color: white; }
        .btn-reject { background: rgba(220,53,69,0.2); color: #dc3545; }
        .btn-reject:hover { background: #dc3545; color: white; }

        .tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 8px;
        }
        .tab {
            padding: 8px 18px;
            border-radius: 30px;
            background: transparent;
            color: #aaa;
            cursor: pointer;
            transition: 0.2s;
        }
        .tab.active {
            background: var(--theme-bg);
            color: var(--theme-color);
        }
        .hidden-tab {
            display: none;
        }
        @media (max-width: 768px) {
            .dashboard-body { padding: 15px; }
            .stats-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="admin-info">
            <div class="admin-avatar" id="adminAvatar">👑</div>
            <div>
                <h4 id="adminName">Admin</h4>
                <span class="branch-badge" id="branchName">Branch</span>
            </div>
        </div>
        <div class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</div>
    </header>

    <div class="dashboard-body">
        <div id="dashboardTab" class="tab-content active-tab">
            <h2 style="margin-bottom: 20px;">Branch Overview</h2>
            <div class="stats-grid" id="statsGrid"></div>
            <div class="table-container">
                <div class="table-header"><h3>Recent Activity</h3></div>
                <div id="recentActivity"></div>
            </div>
        </div>

        <div id="membersTab" class="tab-content hidden-tab">
            <div class="table-container">
                <div class="table-header">
                    <h3>Approved Members</h3>
                    <div class="search-box"><i class="fas fa-search"></i><input type="text" id="memberSearch" placeholder="Search..."></div>
                </div>
                <div style="overflow-x: auto;">
                    <table><thead><tr><th>Member</th><th>Member ID</th><th>WhatsApp</th><th>Joined</th></tr></thead><tbody id="membersTableBody"></tbody></table>
                </div>
            </div>
        </div>

        <div id="requestsTab" class="tab-content hidden-tab">
            <div class="table-container">
                <div class="table-header">
                    <h3>Pending Join Requests</h3>
                    <div class="search-box"><i class="fas fa-search"></i><input type="text" id="requestSearch" placeholder="Search..."></div>
                </div>
                <div style="overflow-x: auto;">
                    <table><thead><tr><th>User</th><th>Contact</th><th>WhatsApp</th><th>Applied</th><th>Action</th></tr></thead><tbody id="requestsTableBody"></tbody></table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Authentication check
        const isAdmin = sessionStorage.getItem('adminLoggedIn') === 'true';
        const branchKey = sessionStorage.getItem('adminBranch');
        const adminName = sessionStorage.getItem('adminName');

        if (!isAdmin || !branchKey) {
            window.location.href = 'admin-login.html';
        }

        // Branch configuration (matching admin credentials)
        const branchConfig = {
            gold: { name: "Gold Zone", color: "#ffd700", icon: "👑" },
            aura: { name: "Aura Zone", color: "#c084fc", icon: "✨" },
            soul: { name: "Soul Zone", color: "#5bc0ff", icon: "👻" },
            pastel: { name: "Pastel Zone", color: "#f9a8d4", icon: "🎨" },
            velvet: { name: "Velvet Zone", color: "#ff6b6b", icon: "🍷" },
            ray: { name: "Ray Zone", color: "#ffb347", icon: "⚡" }
        };

        const branch = branchConfig[branchKey];
        if (!branch) window.location.href = 'admin-login.html';

        // Apply theme
        document.documentElement.style.setProperty('--theme-color', branch.color);
        let hex = branch.color.replace('#','');
        let r = parseInt(hex.substring(0,2),16), g = parseInt(hex.substring(2,4),16), b = parseInt(hex.substring(4,6),16);
        document.documentElement.style.setProperty('--theme-bg', `rgba(${r},${g},${b},0.15)`);
        document.getElementById('adminAvatar').innerText = branch.icon;
        document.getElementById('adminName').innerText = adminName || 'Admin';
        document.getElementById('branchName').innerText = branch.name;

        // Load user data from localStorage
        function loadUsers() {
            return JSON.parse(localStorage.getItem('funCornerUsers')) || [];
        }

        function saveUsers(users) {
            localStorage.setItem('funCornerUsers', JSON.stringify(users));
            // update branch applications
            let branchDB = {};
            users.forEach(u => { if(!branchDB[u.branch]) branchDB[u.branch] = []; branchDB[u.branch].push(u); });
            localStorage.setItem('branch_applications', JSON.stringify(branchDB));
        }

        // Filter users for this branch only
        function getBranchUsers() {
            let all = loadUsers();
            return all.filter(u => u.branch === branch.name);
        }

        // Render stats
        function renderStats() {
            let users = getBranchUsers();
            let pending = users.filter(u => !u.approved).length;
            let approved = users.filter(u => u.approved).length;
            document.getElementById('statsGrid').innerHTML = `
                <div class="stat-card"><div class="stat-icon"><i class="fas fa-users"></i></div><div class="stat-info"><h3>${approved}</h3><p>Total Members</p></div></div>
                <div class="stat-card"><div class="stat-icon"><i class="fas fa-user-plus"></i></div><div class="stat-info"><h3>${pending}</h3><p>Pending Requests</p></div></div>
                <div class="stat-card"><div class="stat-icon"><i class="fas fa-chart-line"></i></div><div class="stat-info"><h3>${users.length}</h3><p>Total Registrations</p></div></div>
            `;
            let recent = [...users].sort((a,b) => new Date(b.registeredAt) - new Date(a.registeredAt)).slice(0,5);
            document.getElementById('recentActivity').innerHTML = recent.length ? `
                <table><thead><tr><th>Name</th><th>Status</th><th>Date</th></tr></thead><tbody>
                ${recent.map(u => `<tr><td>${u.fullName}</td><td><span class="status-badge ${u.approved ? 'status-approved' : 'status-pending'}">${u.approved ? 'Approved' : 'Pending'}</span></td><td>${new Date(u.registeredAt).toLocaleDateString()}</td></tr>`).join('')}
                </tbody></table>
            ` : '<p>No activity yet.</p>';
        }

        // Render members
        function renderMembers(search='') {
            let users = getBranchUsers().filter(u => u.approved);
            if (search) users = users.filter(u => u.fullName.toLowerCase().includes(search) || u.igUsername.toLowerCase().includes(search));
            const tbody = document.getElementById('membersTableBody');
            tbody.innerHTML = users.map(u => `
                <tr>
                    <td><div style="display:flex; align-items:center; gap:8px;"><img src="https://ui-avatars.com/api/?name=${encodeURIComponent(u.fullName)}&background=random&color=fff&size=35" style="width:35px;height:35px;border-radius:50%;"><div><strong>${u.fullName}</strong><br><span style="font-size:0.7rem;">@${u.igUsername}</span></div></div></td>
                    <td>${u.memberNumber || '—'}</td>
                    <td>${u.whatsapp}</td>
                    <td>${new Date(u.registeredAt).toLocaleDateString()}</td>
                </tr>
            `).join('');
            if (!users.length) tbody.innerHTML = '<tr><td colspan="4">No approved members found.</td></tr>';
        }

        // Render requests
        function renderRequests(search='') {
            let users = getBranchUsers().filter(u => !u.approved);
            if (search) users = users.filter(u => u.fullName.toLowerCase().includes(search) || u.igUsername.toLowerCase().includes(search) || (u.email && u.email.toLowerCase().includes(search)));
            const tbody = document.getElementById('requestsTableBody');
            tbody.innerHTML = users.map(u => `
                <tr>
                    <td><div style="display:flex; align-items:center; gap:8px;"><img src="https://ui-avatars.com/api/?name=${encodeURIComponent(u.fullName)}&background=random&color=fff&size=35"><div><strong>${u.fullName}</strong><br>@${u.igUsername}</div></div></td>
                    <td>${u.email || '—'}</td>
                    <td>${u.whatsapp}</td>
                    <td>${new Date(u.registeredAt).toLocaleDateString()}</td>
                    <td><div class="action-btns"><button class="btn-act btn-approve" onclick="approveRequest('${u.email}')"><i class="fas fa-check"></i></button><button class="btn-act btn-reject" onclick="rejectRequest('${u.email}')"><i class="fas fa-times"></i></button></div></td>
                </tr>
            `).join('');
            if (!users.length) tbody.innerHTML = '<tr><td colspan="5">No pending requests.</td></tr>';
        }

        // Approve
        window.approveRequest = function(email) {
            let users = loadUsers();
            let user = users.find(u => u.email === email);
            if (user && !user.approved) {
                user.approved = true;
                // generate member number if not exists
                if (!user.memberNumber) {
                    let branchUsers = users.filter(u => u.branch === user.branch && u.approved);
                    let prefix = user.branch.split(' ')[0].substring(0,3).toUpperCase();
                    let count = branchUsers.length + 1;
                    user.memberNumber = `${prefix}-${String(count).padStart(3,'0')}`;
                }
                saveUsers(users);
                renderStats();
                renderRequests(document.getElementById('requestSearch').value.toLowerCase());
                renderMembers(document.getElementById('memberSearch').value.toLowerCase());
                alert(`✅ ${user.fullName} approved!`);
            }
        };

        // Reject
        window.rejectRequest = function(email) {
            if (confirm('Reject this request? The user will be removed.')) {
                let users = loadUsers();
                let filtered = users.filter(u => u.email !== email);
                saveUsers(filtered);
                renderStats();
                renderRequests(document.getElementById('requestSearch').value.toLowerCase());
                renderMembers(document.getElementById('memberSearch').value.toLowerCase());
                alert('Request rejected and removed.');
            }
        };

        // Tab switching
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden-tab'));
            document.getElementById(tabId + 'Tab').classList.remove('hidden-tab');
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelector(`.tab[data-tab="${tabId}"]`).classList.add('active');
            if (tabId === 'members') renderMembers(document.getElementById('memberSearch').value.toLowerCase());
            if (tabId === 'requests') renderRequests(document.getElementById('requestSearch').value.toLowerCase());
            if (tabId === 'dashboard') renderStats();
        }

        // Add tabs dynamically
        const tabsHtml = `<div class="tabs">
            <div class="tab active" data-tab="dashboard">Dashboard</div>
            <div class="tab" data-tab="members">Members</div>
            <div class="tab" data-tab="requests">Requests</div>
        </div>`;
        document.querySelector('.dashboard-body').insertAdjacentHTML('afterbegin', tabsHtml);
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => switchTab(tab.getAttribute('data-tab')));
        });

        // Search listeners
        document.getElementById('memberSearch').addEventListener('input', (e) => renderMembers(e.target.value.toLowerCase()));
        document.getElementById('requestSearch').addEventListener('input', (e) => renderRequests(e.target.value.toLowerCase()));

        // Logout
        document.getElementById('logoutBtn').addEventListener('click', () => {
            sessionStorage.removeItem('adminLoggedIn');
            sessionStorage.removeItem('adminBranch');
            sessionStorage.removeItem('adminName');
            window.location.href = 'admin-login.html';
        });

        // Initial render
        renderStats();
        renderMembers();
        renderRequests();
    </script>
</body>
</html>
