<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <style>
        body { background: #050508; color: #fff; font-family: Arial; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-box { background: rgba(20,20,30,0.9); padding: 2rem; border-radius: 20px; width: 300px; }
        input { width: 100%; margin: 10px 0; padding: 10px; border-radius: 10px; border: none; }
        button { width: 100%; padding: 10px; background: #E1306C; color: white; border: none; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Admin Login</h2>
        <form id="loginForm">
            <input type="text" id="username" placeholder="Username" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            // আপনি চাইলে এখানে যেকোনো ইউজার/পাসওয়ার্ড দিতে পারেন
            if (user === 'admin' && pass === 'admin') {
                sessionStorage.setItem('adminLoggedIn', 'true');
                sessionStorage.setItem('adminBranch', 'gold');
                window.location.href = 'admin.html';
            } else {
                alert('Invalid credentials');
            }
        });
    </script>
</body>
</html>
